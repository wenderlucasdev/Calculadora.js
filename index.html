<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
  <head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
  </head>
  <body>

    <main class="calculator">

      <input type="text" id="display" readonly>
      <div class="buttons">
        <button class="btn-clear" onclick="clearDisplay()">C</button>
        <button class="btn-operator" onclick="appendToDisplay('/')">/</button>
        <button class="btn-operator" onclick="appendToDisplay('*')">X</button>
        <button class="btn-operator" onclick="deleteLast()">DEL</button>
        
        <button  onclick="appendToDisplay('7')">7</button>
        <button  onclick="appendToDisplay('8')">8</button>
        <button  onclick="appendToDisplay('9')">9</button>
        <button class="btn-operator" onclick="appendToDisplay('-')">-</button>
        
        <button  onclick="appendToDisplay('4')">4</button>
        <button  onclick="appendToDisplay('5')">5</button>
        <button  onclick="appendToDisplay('6')">6</button>
        <button class="btn-operator" onclick="appendToDisplay('+')">+</button>
        
        <button  onclick="appendToDisplay('1')">1</button>
        <button  onclick="appendToDisplay('2')">2</button>
        <button  onclick="appendToDisplay('3')">3</button>
        <button class="btn-equal" onclick="calculate()">=</button>
        
        <button onclick="appendToDisplay('.')">.</button>
        <button class="btn-zero" onclick="appendToDisplay(0)">0</button>  
      </div>
      <div class="theme">
        <button id="theme-toggle">
            <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
        </button>
      </div>
    
    
    </main>
    <script src="script.js"></script>
  </body>
</html>
